# =============================================================================
# PROJETO TDS — Manifesto Final (Full Connectivity & Worker Fix)
# =============================================================================

version: '3.8'

networks:
  kreativ_net:
    name: kreativ_education_net
    driver: bridge
  dokploy-network:
    name: dokploy-network
    external: true

volumes:
  frappe_mariadb_data:
  frappe_sites_data:
  frappe_logs_data:
  frappe_assets_data:
  anythingllm_storage:
  openclaw_data:
  postgres_data:
  redis_data:
  n8n_data:
  evolution_data:

services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kreativ_net

  mariadb:
    image: mariadb:10.6
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: frappe_kreativ
      MYSQL_USER: frappe
      MYSQL_PASSWORD: ${MARIADB_FRAPPE_PASSWORD}
    volumes:
      - frappe_mariadb_data:/var/lib/mysql
    networks:
      - kreativ_net

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - kreativ_net

  # --- FRAPPE SERVICES (LMS) ---

  backend:
    image: tds-frappe-custom:latest
    restart: unless-stopped
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
      - frappe_logs_data:/home/frappe/frappe-bench/logs
      - frappe_assets_data:/home/frappe/frappe-bench/sites/assets
    environment:
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME}
    networks:
      - kreativ_net
      - dokploy-network
    depends_on:
      - mariadb
      - redis

  scheduler:
    image: tds-frappe-custom:latest
    restart: unless-stopped
    command: bench schedule
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
    networks:
      - kreativ_net
    depends_on:
      - backend

  worker-default:
    image: tds-frappe-custom:latest
    restart: unless-stopped
    command: bench worker --queue default
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
    networks:
      - kreativ_net
    depends_on:
      - backend

  worker-short:
    image: tds-frappe-custom:latest
    restart: unless-stopped
    command: bench worker --queue short
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
    networks:
      - kreativ_net
    depends_on:
      - backend

  worker-long:
    image: tds-frappe-custom:latest
    restart: unless-stopped
    command: bench worker --queue long
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
    networks:
      - kreativ_net
    depends_on:
      - backend

  socketio:
    image: frappe/frappe-socketio:latest
    restart: always
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
    networks:
      - kreativ_net
      - dokploy-network
    depends_on:
      - backend

  frappe_frontend:
    image: tds-frappe-custom:latest
    restart: unless-stopped
    command: /usr/local/bin/nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      SOCKETIO: socketio:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME}
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
      - frappe_assets_data:/home/frappe/frappe-bench/sites/assets
    networks:
      - kreativ_net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tds-lms.rule=Host(`lms.ipexdesenvolvimento.cloud`)"
      - "traefik.http.routers.tds-lms.entrypoints=websecure"
      - "traefik.http.routers.tds-lms.tls=true"
      - "traefik.http.routers.tds-lms.tls.certresolver=letsencrypt"
      - "traefik.http.services.tds-lms.loadbalancer.server.port=8080"
      - "traefik.docker.network=dokploy-network"
    depends_on:
      - socketio

  # --- RAG SERVICES (ANYTHINGLLM) ---

  anythingllm:
    image: mintplexlabs/anythingllm:latest
    restart: always
    environment:
      - PORT=3001
      - STORAGE_DIR=/app/server/storage
    volumes:
      - anythingllm_storage:/app/server/storage
    networks:
      - kreativ_net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tds-rag.rule=Host(`rag.ipexdesenvolvimento.cloud`)"
      - "traefik.http.routers.tds-rag.entrypoints=websecure"
      - "traefik.http.routers.tds-rag.tls=true"
      - "traefik.http.routers.tds-rag.tls.certresolver=letsencrypt"
      - "traefik.http.services.tds-rag.loadbalancer.server.port=3001"
      - "traefik.docker.network=dokploy-network"

  # --- AUTOMATION SERVICES (N8N / EVOLUTION) ---

  evolution-api:
    image: atendai/evolution-api:latest
    restart: always
    environment:
      SERVER_PORT: 8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${PG_USER}:${PG_PASSWORD}@postgres:5432/${EVOLUTION_DB}
    volumes:
      - evolution_data:/app/instances
    networks:
      - kreativ_net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tds-evolution.rule=Host(`evolution.ipexdesenvolvimento.cloud`)"
      - "traefik.http.routers.tds-evolution.entrypoints=websecure"
      - "traefik.http.routers.tds-evolution.tls=true"
      - "traefik.http.routers.tds-evolution.tls.certresolver=letsencrypt"
      - "traefik.http.services.tds-evolution.loadbalancer.server.port=8080"
      - "traefik.docker.network=dokploy-network"
    depends_on:
      - postgres

  n8n:
    image: n8nio/n8n:latest
    restart: always
    environment:
      N8N_HOST: n8n.ipexdesenvolvimento.cloud
      WEBHOOK_URL: https://n8n.ipexdesenvolvimento.cloud
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${PG_DATABASE}
      DB_POSTGRESDB_USER: ${PG_USER}
      DB_POSTGRESDB_PASSWORD: ${PG_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - kreativ_net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tds-n8n.rule=Host(`n8n.ipexdesenvolvimento.cloud`)"
      - "traefik.http.routers.tds-n8n.entrypoints=websecure"
      - "traefik.http.routers.tds-n8n.tls=true"
      - "traefik.http.routers.tds-n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.tds-n8n.loadbalancer.server.port=5678"
      - "traefik.docker.network=dokploy-network"
    depends_on:
      - postgres
