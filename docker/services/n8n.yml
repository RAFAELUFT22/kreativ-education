version: '3.8'

networks:
  dokploy-network:
    external: true

volumes:
  n8n_data:
    name: kreativ_n8n_data

services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    environment:
      N8N_HOST: n8n.ipexdesenvolvimento.cloud
      WEBHOOK_URL: https://n8n.ipexdesenvolvimento.cloud
      N8N_PROTOCOL: https
      N8N_PORT: 5678
      # Banco de dados (usa o postgres compartilhado via dokploy-network)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: ${PG_HOST:-kreativ-postgres}
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${PG_DATABASE:-kreativ_n8n}
      DB_POSTGRESDB_USER: ${PG_USER:-kreativ}
      DB_POSTGRESDB_PASSWORD: ${PG_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kreativ-n8n.rule=Host(`n8n.ipexdesenvolvimento.cloud`)"
      - "traefik.http.routers.kreativ-n8n.entrypoints=websecure"
      - "traefik.http.routers.kreativ-n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.kreativ-n8n.loadbalancer.server.port=5678"
      - "traefik.docker.network=dokploy-network"
